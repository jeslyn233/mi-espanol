<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Selection System v2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FFFBFD;
    --surface: #FFFFFF;
    --matcha: #FFD0D8;
    --matcha-hover: #FFBCC6;
    --matcha-text: #7D5060;
    --amber: #FFE8A0;
    --amber-light: #FFF3C0;
    --amber-text: #8B6D30;
    --text: #3D2D30;
    --text2: #7D6068;
    --text3: #B098A0;
    --border: #F0E0E5;
    --shadow: 0 2px 12px rgba(0,0,0,.04);
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  /* 飘浮装饰 */
  .decorations {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .float-item {
    position: absolute; bottom: -40px;
    animation: floatUp var(--dur, 10s) linear infinite;
    animation-delay: var(--delay, 0s);
    opacity: 0.45;
    user-select: none;
    will-change: transform;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
    8%   { opacity: 0.5; }
    92%  { opacity: 0.5; }
    100% { transform: translateY(-110vh) translateX(var(--drift, 20px)) rotate(var(--spin, 15deg)); opacity: 0; }
  }

  .app {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem 1.5rem;
  }

  /* INTRO */
  .intro-screen {
    text-align: center;
    max-width: 460px;
    animation: fadeIn 1.2s ease;
  }
  .intro-icon {
    font-size: 3rem; margin-bottom: 1rem;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .intro-badge {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--matcha-text); background: var(--matcha);
    display: inline-block; padding: 6px 16px; border-radius: 20px;
    margin-bottom: 1.8rem; font-weight: 500;
  }
  .intro-title {
    font-family: 'Lora', serif;
    font-size: clamp(1.5rem, 4.5vw, 2rem);
    font-weight: 400; line-height: 1.5;
    color: var(--text);
    margin-bottom: 0.8rem;
  }
  .intro-sub {
    font-size: 14px; color: var(--text2); line-height: 1.8;
    margin-bottom: 2.5rem;
  }
  .btn-start {
    background: var(--matcha);
    border: none;
    color: var(--matcha-text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500; letter-spacing: 0.06em;
    padding: 13px 42px; border-radius: 30px; cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 2px 8px rgba(255,160,176,0.25);
  }
  .btn-start:hover {
    background: var(--matcha-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(255,160,176,0.35);
  }

  /* QUIZ */
  .quiz-screen {
    max-width: 520px; width: 100%;
    animation: slideUp 0.5s ease;
  }
  .progress-wrap {
    width: 100%; height: 4px;
    background: rgba(0,0,0,0.06);
    border-radius: 2px; margin-bottom: 3rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--matcha);
    border-radius: 2px; transition: width 0.5s ease;
  }
  .q-number {
    font-size: 11px; letter-spacing: 0.12em; color: var(--text3);
    text-transform: uppercase; margin-bottom: 0.8rem;
  }
  .q-text {
    font-family: 'Lora', serif; font-size: clamp(1.05rem, 3vw, 1.3rem);
    font-weight: 400; line-height: 1.7; color: var(--text);
    margin-bottom: 2.2rem;
  }
  .q-text code {
    font-family: 'Courier New', monospace;
    font-size: 12px; color: var(--text2);
    display: block; margin-top: 6px;
  }
  .options {
    display: flex; flex-direction: column; gap: 12px;
  }
  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2); font-family: 'DM Sans', sans-serif;
    font-size: 14px; line-height: 1.5;
    padding: 14px 20px; border-radius: 12px; cursor: pointer;
    text-align: left; display: flex; align-items: flex-start; gap: 12px;
    transition: all 0.25s ease;
    box-shadow: var(--shadow);
  }
  .option-btn:hover {
    background: var(--matcha);
    border-color: var(--matcha-hover);
    color: var(--matcha-text); transform: translateX(4px);
  }
  .option-btn.selected {
    background: var(--matcha);
    border-color: var(--matcha-hover);
    color: var(--matcha-text);
  }
  .opt-key {
    font-size: 11px; color: var(--text3); min-width: 14px;
    padding-top: 2px; font-weight: 500;
  }
  .option-btn.selected .opt-key,
  .option-btn:hover .opt-key { color: var(--matcha-text); }

  /* 回应气泡 */
  .reaction-toast {
    text-align: center;
    margin-top: 18px;
    padding: 11px 22px;
    background: var(--amber-light);
    color: var(--amber-text);
    border-radius: 20px;
    font-size: 13px;
    font-style: italic;
    animation: popInFade 1.4s ease forwards;
    line-height: 1.5;
  }
  @keyframes popInFade {
    0%   { opacity: 0; transform: scale(0.9) translateY(4px); }
    18%  { opacity: 1; transform: scale(1) translateY(0); }
    65%  { opacity: 1; transform: scale(1) translateY(0); }
    100% { opacity: 0; transform: scale(1) translateY(-6px); }
  }

  /* RESULT */
  .result-screen {
    max-width: 500px; width: 100%; text-align: center;
    animation: fadeIn 1.2s ease;
  }
  .result-title {
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--text3); margin-bottom: 1.2rem;
  }
  .result-badge {
    font-family: 'Lora', serif; font-size: 2rem; font-weight: 400;
    color: var(--text); margin-bottom: 0.4rem;
  }
  .result-subtitle {
    font-size: 12px; color: var(--text3); letter-spacing: 0.08em;
    margin-bottom: 2.2rem;
  }
  .result-poem {
    font-family: 'Lora', serif; font-style: italic;
    font-size: 15px; line-height: 2; color: var(--amber-text);
    margin-bottom: 2.5rem;
    border-left: 2px solid var(--amber-light);
    padding-left: 1.5rem; text-align: left;
  }
  .gift-reveal {
    border: 1px dashed var(--amber);
    border-radius: 14px; padding: 2rem 1.5rem;
    background: rgba(255,224,160,0.12);
    margin-bottom: 1.8rem;
  }
  .gift-unlock-label {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--amber-text); margin-bottom: 0.8rem;
    font-weight: 500;
  }
  .gift-wrap {
    position: relative; display: inline-block; margin: 0 auto 1rem;
  }
  .gift-box {
    position: absolute; inset: 0; z-index: 2;
    background: linear-gradient(135deg, #D4E8F8 0%, #F8D4E0 50%, #D4E8F8 100%);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.7s cubic-bezier(0.5, 0, 0.3, 1);
    cursor: pointer;
  }
  .gift-box.open {
    opacity: 0; transform: scale(1.06);
  }
  .gift-bow {
    width: 100px; height: auto;
    mix-blend-mode: multiply;
    transition: all 0.6s ease;
  }
  .gift-box.open .gift-bow {
    transform: translateY(-30px) scale(1.4); opacity: 0;
  }

  .confetti {
    position: fixed; pointer-events: none; z-index: 200;
    font-size: 20px; animation: burst 1s ease-out forwards;
  }
  @keyframes burst {
    0% { opacity: 1; transform: translate(0,0) scale(0.5); }
    100% { opacity: 0; transform: translate(var(--ex),var(--ey)) scale(1); }
  }
  .gift-img {
    width: 100%; max-width: 240px; height: auto;
    border-radius: 10px; display: block;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
  }
  .gift-note {
    font-size: 13px; color: var(--text2); font-style: italic;
  }

  /* 茄子寄语 */
  .btn-message {
    background: var(--amber-light);
    border: none;
    color: var(--amber-text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500; letter-spacing: 0.06em;
    padding: 13px 36px; border-radius: 30px; cursor: pointer;
    transition: all 0.3s ease;
    margin-bottom: 1.2rem;
    box-shadow: 0 2px 8px rgba(200,160,60,0.15);
  }
  .btn-message:hover {
    background: var(--amber);
    color: #FFF;
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(200,160,60,0.25);
  }
  .btn-message.done {
    pointer-events: none; opacity: 0.5;
  }

  .typewriter-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 1.8rem 1.5rem;
    margin-bottom: 2rem; text-align: left;
    box-shadow: var(--shadow);
    max-height: 420px; overflow-y: auto;
  }
  .typewriter-text {
    font-size: 14px; line-height: 2; color: var(--text);
    font-family: 'Lora', 'DM Sans', serif;
  }
  .typewriter-cursor {
    display: inline; color: var(--amber);
    font-weight: 300; font-size: 14px;
    animation: blink 0.7s step-end infinite;
  }
  .typewriter-cursor.stop { animation: none; opacity: 0; }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .btn-restart {
    display: block; margin: 0.3rem auto 0;
    font-size: 12px; color: var(--text3); background: none; border: none;
    cursor: pointer; letter-spacing: 0.08em;
    padding: 8px 0; transition: color 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-restart:hover { color: var(--text2); }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .music-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 10;
    background: rgba(255,255,255,0.7); border: 1px solid var(--border);
    border-radius: 50%; width: 38px; height: 38px;
    font-size: 16px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: all 0.25s ease; backdrop-filter: blur(6px);
  }
  .music-toggle:hover { background: var(--surface); }

  /* 水印 */
  .watermark {
    position: fixed; left: 0; right: 0; z-index: 0;
    text-align: center;
    pointer-events: none; user-select: none;
    font-family: 'Lora', 'Georgia', serif;
    font-size: clamp(2rem, 6vw, 4.5rem);
    font-style: italic; font-weight: 400;
    letter-spacing: 0.1em;
    color: rgba(255,150,175,0.06);
    animation: fadeIn 1.5s ease;
  }
  .watermark-top { top: 1.5vh; }
  .watermark-bot { bottom: 1.5vh; }

  /* LOADING */
  .loading-screen { text-align: center; animation: fadeIn 0.4s ease; padding: 2rem 0; }
  .loading-text { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; }
  .loading-bar-wrap { width: 220px; height: 4px; background: rgba(0,0,0,0.06); border-radius: 2px; margin: 0 auto 0.8rem; overflow: hidden; }
  .loading-bar-fill { height: 100%; background: var(--matcha); border-radius: 2px; width: 0%; }
  .loading-pct { font-size: 28px; font-family: 'Lora', serif; color: var(--matcha-text); }


  .hidden { display: none !important; }
</style>
</head>
<body>

<audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>
<div class="decorations" id="decorations"></div>

<button class="music-toggle" id="music-btn" onclick="toggleBGM()" title="音乐开关">🔇</button>
<div class="watermark watermark-top" id="watermark-top">HAPPY BIRTHDAY</div>
<div class="watermark watermark-bot" id="watermark-bot">HAPPY BIRTHDAY</div>
<div class="app">

  <!-- INTRO -->
  <div class="intro-screen" id="intro">
    <div class="intro-icon">🎁</div>
    <div class="intro-badge">🎂 生日礼物选择系统 v2.0</div>
    <h1 class="intro-title">🌽 你的礼物已被系统锁定</h1>
    <p class="intro-sub">在无意义的选项里，藏着你的灵魂偏好。<br>10 道题，解锁你的专属礼物。</p>
    <button class="btn-start" onclick="startQuiz()">即刻前往 →</button>
  </div>

  <!-- QUIZ -->
  <div class="quiz-screen hidden" id="quiz">
    <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>
    <p class="q-number" id="q-number"></p>
    <p class="q-text" id="q-text"></p>
    <div class="options" id="options"></div>
  </div>

  <!-- LOADING -->
  <div class="loading-screen hidden" id="loading">
    <p class="loading-text">🔓 正在解锁你的专属礼物...</p>
    <div class="loading-bar-wrap"><div class="loading-bar-fill" id="loading-fill"></div></div>
    <p class="loading-pct" id="loading-pct">0%</p>
  </div>

  <!-- RESULT -->
  <div class="result-screen hidden" id="result"></div>

</div>

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildDecorations() {
  const container = document.getElementById('decorations');
  const emojis = ['🎂','🕯️','⭐','🎀','🎉','🎊','🎁','✨','💝','🌟','🎈','🎆','🧁','💫','🌸','🎇','🎂','🌽'];
  for (let i = 0; i < 35; i++) {
    const el = document.createElement('span');
    el.className = 'float-item';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.cssText = `
      --drift: ${(Math.random()-0.5)*80}px;
      --spin: ${(Math.random()-0.5)*50}deg;
      --dur: ${9+Math.random()*12}s;
      --delay: ${Math.random()*14}s;
      left: ${Math.random()*100}%;
      font-size: ${14+Math.random()*16}px;
      opacity: ${0.25+Math.random()*0.3};
    `;
    container.appendChild(el);
  }
}

function startQuiz() {
  if (typewriterTimer) { clearTimeout(typewriterTimer); typewriterTimer = null; }
  const bgm = document.getElementById('bgm');
  if (bgm.paused) { bgm.volume = 0.35; bgm.play().then(() => {
    document.getElementById('music-btn').textContent = '🔊';
  }).catch(()=>{}); }
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  current = 0;
  tally = { A:0, B:0, C:0, D:0 };
  renderQ();
}

function toggleBGM() {
  const bgm = document.getElementById('bgm');
  const btn = document.getElementById('music-btn');
  if (bgm.paused) {
    bgm.volume = 0.35;
    bgm.play().then(() => { btn.textContent = '🔊'; }).catch(()=>{});
  } else {
    bgm.pause();
    btn.textContent = '🔇';
  }
}

function renderQ() {
  document.querySelectorAll('.reaction-toast').forEach(t => t.remove());
  const q = questions[current];
  currentOrder = shuffle([0, 1, 2, 3]);
  const total = questions.length;
  document.getElementById('progress').style.width = ((current/total)*100)+'%';
  document.getElementById('q-number').textContent = `Q${current+1} / ${total}`;

  const qEl = document.getElementById('q-text');
  if (q.text.includes('\\n')) {
    const parts = q.text.split('\\n');
    qEl.innerHTML = parts[0] + parts.slice(1).map(l =>
      `<code>${l}</code>`
    ).join('');
  } else {
    qEl.textContent = q.text;
  }

  const optEl = document.getElementById('options');
  optEl.innerHTML = '';
  currentOrder.forEach((idx, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-key">${keys[i]}</span><span>${q.opts[idx]}</span>`;
    btn.onclick = () => pick(i);
    optEl.appendChild(btn);
  });
}

function pick(i) {
  const q = questions[current];
  const idx = currentOrder[i];
  const score = q.scores[idx];
  if (score) {
    const w = q.weight || 1;
    tally[score] += w;
  }

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.style.pointerEvents = 'none');
  btns[i].classList.add('selected');

  if (q.reactions && q.reactions[idx]) {
    const toast = document.createElement('div');
    toast.className = 'reaction-toast';
    toast.textContent = q.reactions[idx];
    document.getElementById('options').after(toast);
  }

  setTimeout(() => {
    current++;
    if (current < questions.length) {
      renderQ();
    } else {
      showLoading();
    }
  }, 1100);
}

function showLoading() {
  document.getElementById('quiz').classList.add('hidden');
  const loading = document.getElementById('loading');
  loading.classList.remove('hidden');

  const bar = document.getElementById('loading-fill');
  const pct = document.getElementById('loading-pct');
  let progress = 0;
  const total = 1800;
  const step = 40;
  const inc = 100 / (total / step);

  const timer = setInterval(() => {
    progress += inc;
    const val = Math.min(Math.round(progress), 99);
    bar.style.width = val + '%';
    bar.style.transition = 'width 0.04s linear';
    pct.textContent = val + '%';

    if (val >= 99) {
      clearInterval(timer);
      setTimeout(() => {
        pct.textContent = '100%';
        bar.style.width = '100%';
        setTimeout(() => {
          loading.classList.add('hidden');
          showResult();
        }, 300);
      }, 200);
    }
  }, step);
}

function showResult() {
  document.getElementById('quiz').classList.add('hidden');
  const winner = Object.entries(tally).sort((a,b) => b[1]-a[1])[0][0];
  const r = results[winner];
  const el = document.getElementById('result');

  el.innerHTML = `
    <p class="result-title">你的答案已归档</p>
    <h2 class="result-badge">${r.title}</h2>
    <p class="result-subtitle">${r.subtitle}</p>
    <div class="result-poem">${r.poem.split('\\n').join('<br>')}</div>
    <div class="gift-reveal">
      <p class="gift-unlock-label">🎁 专属礼物已解锁</p>
      <div class="gift-wrap">
        <img src="${r.img}" alt="${r.title}" class="gift-img">
        <div class="gift-box" id="gift-box" onclick="openBox()">
          <img src="bow.jpg" class="gift-bow" alt="蝴蝶结">
        </div>
      </div>
      <p class="gift-note">${r.vibe}</p>
    </div>
    <button class="btn-message" id="btn-message" onclick="startTypewriter()">🍆 茄子寄语</button>
    <div class="typewriter-area hidden" id="typewriter-area">
      <div class="typewriter-text" id="typewriter-text"></div>
    </div>
    <button class="btn-restart" onclick="restart()">↩ 重新测试</button>
  `;
  el.classList.remove('hidden');
  setTimeout(() => {
    const box = document.getElementById('gift-box');
    if (box && !box.classList.contains('open')) openBox();
  }, 2500);
}

function startTypewriter() {
  const btn = document.getElementById('btn-message');
  const area = document.getElementById('typewriter-area');
  const textEl = document.getElementById('typewriter-text');

  if (btn.classList.contains('done')) return;

  btn.textContent = '正在书写...';
  area.classList.remove('hidden');
  textEl.innerHTML = '<span class="typewriter-cursor" id="typewriter-cursor">|</span>';

  let lineIdx = 0;
  let charIdx = 0;

  function type() {
    const cursor = document.getElementById('typewriter-cursor');
    if (lineIdx >= typewriterMsg.length) {
      if (cursor) cursor.classList.add('stop');
      btn.textContent = '🍆 茄子寄语';
      btn.classList.add('done');
      return;
    }

    const line = typewriterMsg[lineIdx];

    if (charIdx >= line.length) {
      textEl.insertBefore(document.createElement('br'), cursor);
      lineIdx++;
      charIdx = 0;
      typewriterTimer = setTimeout(type, 120);
      return;
    }

    const char = line[charIdx];
    const span = document.createElement('span');
    span.textContent = char;
    textEl.insertBefore(span, cursor);
    charIdx++;

    const delay = char === '，' || char === '。' || char === '！' || char === '~' ? 160 :
                  char === ' ' ? 40 : 65;
    typewriterTimer = setTimeout(type, delay);
    area.scrollTop = area.scrollHeight;
  }

  typewriterTimer = setTimeout(type, 300);
}

function openBox() {
  const box = document.getElementById('gift-box');
  if (!box) return;
  box.classList.add('open');
  const rect = box.getBoundingClientRect();
  burstConfetti(rect.left + rect.width/2, rect.top + rect.height/2);
  setTimeout(() => box.remove(), 800);
}

function burstConfetti(x, y) {
  const pieces = ['🎉','🎊','✨','🎀','💝','⭐','🌟','💫','🎆'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('span');
    el.className = 'confetti';
    el.textContent = pieces[Math.floor(Math.random() * pieces.length)];
    const angle = Math.random() * Math.PI * 2;
    const dist = 100 + Math.random() * 200;
    el.style.cssText = `
      left: ${x}px; top: ${y}px;
      --ex: ${Math.cos(angle)*dist}px; --ey: ${Math.sin(angle)*dist}px;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1050);
  }
}

function restart() {
  if (typewriterTimer) { clearTimeout(typewriterTimer); typewriterTimer = null; }
  document.getElementById('result').classList.add('hidden');
  document.getElementById('intro').classList.remove('hidden');
}

buildDecorations();
</script>
</body>
</html>
